name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Lint
        run: ./node_modules/.bin/eslint .

      - name: Safety tests
        run: bun tests/safety.test.ts

      - name: Data-integrity tests
        run: bun tests/data.test.ts

      - name: Toxin database tests
        run: bun tests/toxins.test.ts

      - name: AI safety tests
        run: bun tests/ai.test.ts

      - name: Data-mode gating tests
        run: bun tests/dataMode.test.ts

      - name: Empty-pet + demo-provenance tests
        run: bun tests/petEmptyState.test.ts

      - name: Symptom knowledge-base tests
        run: bun tests/symptomKb.test.ts

      - name: Weekly insights tests
        run: bun tests/insights.test.ts
